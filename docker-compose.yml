# 生产环境部署配置（默认）
# 用途：生产部署、首次搭建环境、CI/CD
# 使用：docker-compose up -d
# 特点：从源代码构建、包含健康检查、自动重启
# 详细说明：docs/DOCKER_COMPOSE_GUIDE.md

version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: model-converter-api
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - uploads:/app/uploads:rw
      - outputs:/app/outputs:rw
      - ./ne301:/workspace/ne301:rw
      # 开发模式：挂载代码目录实现热重载
      - ./backend/app:/app/app:ro
      - ./backend/tools:/app/tools:ro
    environment:
      - NE301_DOCKER_IMAGE=camthink/ne301-dev:latest
      - NE301_PROJECT_PATH=/workspace/ne301
      - CONTAINER_NAME=model-converter-api
      - PYTHONUNBUFFERED=1
    networks:
      - conversion_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  uploads:
  outputs:

networks:
  conversion_network:
    driver: bridge
