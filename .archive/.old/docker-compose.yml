services:
  # Redis 消息队列
  redis:
    image: redis:7-alpine
    # 无 platform 约束 - Docker 自动选择架构（ARM64/AMD64）
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ne301-model-converter-backend:latest
    command: sh -c "pip install --no-cache-dir 'celery[redis]==5.4.0' 'redis==5.2.0' 'loguru>=0.7.0' && source /etc/profile.d/stedgeai.sh 2>/dev/null || true && exec python3 -m uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./temp:/app/temp
      - ./outputs:/app/outputs
      - ../Model:/workspace/Model:ro
      - ../Script:/workspace/Script:ro
    environment:
      - NE301_PROJECT_PATH=/workspace
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    cpus: '4.0'
    mem_limit: 8g
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Celery Worker（后台任务处理）
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ne301-model-converter-backend:latest
    command: sh -c "pip install --no-cache-dir 'celery[redis]==5.4.0' 'redis==5.2.0' 'loguru>=0.7.0' && python3 -m celery -A app.worker worker --loglevel=info --concurrency=1"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./temp:/app/temp
      - ./outputs:/app/outputs
      - ../Model:/workspace/Model:ro
      - ../Script:/workspace/Script:ro
    environment:
      - NE301_PROJECT_PATH=/workspace
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Worker 稳定性配置
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=10
      - CELERY_WORKER_PREFETCH_MULTIPLIER=1
    cpus: '4.0'
    mem_limit: 8g
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker inspect active --timeout=5 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  # 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ne301-model-converter-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads-data:
  temp-data:
  outputs-data:
