services:
  # Redis 消息队列
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # FastAPI 后端（ARM64 原生版本）
  backend:
    image: ne301-backend-arm64:latest  # ARM64 原生镜像
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./temp:/app/temp
      - ./outputs:/app/outputs
      - ../Model:/workspace/Model:ro  # 挂载 NE301 Model 目录（只读）
      - ../Script:/workspace/Script:ro  # 挂载 NE301 Script 目录（只读）
    environment:
      - NE301_PROJECT_PATH=/workspace
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # ARM64 平台约束
    platform: linux/arm64

  # 前端
  frontend:
    image: ne301-model-converter-frontend:v2
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
