# 开发环境配置
# 用途：搭建开发环境、DEBUG 模式、修改依赖后验证
# 使用：docker-compose -f docker-compose.dev.yml up --build
# 特点：DEBUG 模式启用、详细日志输出
# 详细说明：docs/DOCKER_COMPOSE_GUIDE.md

version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: model-converter-api
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # 开发模式：挂载源代码
      - ./backend/app:/app/app:ro
      - ./backend/tools:/app/tools:ro
      - uploads:/app/uploads:rw
      - outputs:/app/outputs:rw
      - ./ne301:/workspace/ne301:rw
    environment:
      - NE301_DOCKER_IMAGE=camthink/ne301-dev:latest
      - NE301_PROJECT_PATH=/workspace/ne301
      - CONTAINER_NAME=model-converter-api
      - PYTHONUNBUFFERED=1
      - DEBUG=1
    networks:
      - conversion_network

volumes:
  uploads:
  outputs:

networks:
  conversion_network:
    driver: bridge
