<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>诊断测试</title>
</head>
<body>
    <h1>前端诊断测试</h1>
    <div id="results"></div>

    <script type="module">
        const results = [];

        function addResult(text) {
            results.push(text);
            document.getElementById('results').innerHTML = results.join('<br>');
        }

        addResult('=== 开始测试 ===');
        addResult('时间: ' + new Date().toLocaleString());

        // 测试 1: 加载主页面
        fetch('/')
            .then(r => {
                addResult('✅ 主页面 HTTP: ' + r.status);
                return r.text();
            })
            .then(html => {
                if (html.includes('id="app"')) {
                    addResult('✅ HTML 包含 #app 元素');
                } else {
                    addResult('❌ HTML 缺少 #app 元素');
                }
            })
            .catch(e => addResult('❌ 主页面加载失败: ' + e.message));

        // 测试 2: 加载 JavaScript
        setTimeout(() => {
            fetch('/assets/index-6KA3L6WJ.js')
                .then(r => {
                    addResult('✅ JavaScript HTTP: ' + r.status);
                    return r.text();
                })
                .then(js => {
                    if (js.includes('Preact')) {
                        addResult('✅ JavaScript 包含 Preact');
                    }
                    if (js.includes('render')) {
                        addResult('✅ JavaScript 包含 render');
                    }
                })
                .catch(e => addResult('❌ JavaScript 加载失败: ' + e.message));
        }, 1000);

        // 测试 3: API 连接
        setTimeout(() => {
            fetch('/api/setup/check')
                .then(r => r.json())
                .then(data => {
                    addResult('✅ API 状态: ' + data.status);
                })
                .catch(e => addResult('❌ API 连接失败: ' + e.message));
        }, 2000);

        // 测试 4: 监听全局错误
        window.addEventListener('error', (e) => {
            addResult('❌ 全局错误: ' + e.message);
            addResult('   文件: ' + e.filename);
            addResult('   行号: ' + e.lineno);
        });

        window.addEventListener('unhandledrejection', (e) => {
            addResult('❌ Promise 错误: ' + e.reason);
        });

        addResult('=== 测试配置完成 ===');
        addResult('请查看上方结果，如果都是 ✅，说明资源加载正常');
        addResult('如果看到 ❌ 错误，请将完整结果反馈');
    </script>
</body>
</html>
