new_feature:
  name: 新功能开发
  triggers:
    - 添加
    - 实现
    - 新增功能
  priority: 30  # 中等优先级
  strong_match: false
  agents:
    - planner
    - architect
    - tdd-guide
  skills:
    - python-patterns
    - typescript-patterns
    - testing
  closed_loops:
    - B
    - E
    - F
  estimated_time: "2h"

bug_fix:
  name: Bug修复
  triggers:
    - 修复
    - fix
    - bug
    - 错误
  priority: 20  # 高优先级
  strong_match: false
  agents:
    - coordinator
    - developer
    - code-reviewer
  skills:
    - testing
    - debugging
  closed_loops:
    - B
    - E
  estimated_time: "30min"

refactor:
  name: 代码重构
  triggers:
    - 重构
    - 优化代码
    - 改善结构
  priority: 50
  strong_match: true  # "重构"必须精确匹配
  agents:
    - architect
    - developer
    - code-reviewer
  skills:
    - python-patterns
    - typescript-patterns
    - testing
  closed_loops:
    - B
    - F
  estimated_time: "1-3h"

performance_optimization:
  name: 性能优化
  triggers:
    - 性能
    - 优化速度
    - 提升效率
  priority: 40
  strong_match: false
  agents:
    - developer
    - performance-specialist
    - code-reviewer
  skills:
    - debugging
    - profiling
    - testing
  closed_loops:
    - B
    - E
  estimated_time: "2-6h"

security_review:
